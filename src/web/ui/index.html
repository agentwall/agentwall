<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AgentWall — Approval</title>
<link rel="icon" href="/logo.png" type="image/png">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #0f1117;
    color: #e1e4e8;
    min-height: 100vh;
  }
  a { color: #58a6ff; text-decoration: none; }
  a:hover { text-decoration: underline; }

  .nav {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    padding: 0.75rem 1.5rem;
    background: #161b22;
    border-bottom: 1px solid #30363d;
  }
  .nav-brand {
    font-weight: 700;
    font-size: 1.25rem;
    color: #e1e4e8;
    margin-right: auto;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .nav-logo {
    width: 32px;
    height: 32px;
  }
  .nav a { font-size: 1rem; }
  .nav-active { color: #e1e4e8; font-weight: 600; }

  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #3fb950;
    margin-left: 0.5rem;
    vertical-align: middle;
  }
  .status-dot.disconnected { background: #f85149; }

  .container {
    max-width: 640px;
    margin: 2rem auto;
    padding: 0 1rem;
  }

  .empty-state {
    text-align: center;
    padding: 4rem 1rem;
    color: #8b949e;
  }
  .empty-state h2 {
    font-size: 1.25rem;
    color: #e1e4e8;
    margin-bottom: 0.5rem;
  }
  .empty-state p { margin-bottom: 1rem; }
  .clients-summary {
    font-size: 0.8125rem;
    color: #8b949e;
    margin-bottom: 1.5rem;
  }
  .clients-summary .protected-label { color: #3fb950; }
  .empty-links { display: flex; gap: 1rem; justify-content: center; }

  .approval-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 1.5rem;
    display: none;
  }
  .approval-card.visible { display: block; }

  .card-header {
    font-size: 1.125rem;
    font-weight: 600;
    margin-bottom: 1.25rem;
    color: #f0883e;
  }

  .field { margin-bottom: 0.75rem; }
  .field-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #8b949e;
    margin-bottom: 0.25rem;
  }
  .field-value {
    font-size: 0.9375rem;
    word-break: break-all;
  }

  .args-block {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 0.75rem 1rem;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 0.8125rem;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 240px;
    overflow-y: auto;
    color: #c9d1d9;
  }

  .countdown {
    text-align: center;
    color: #8b949e;
    font-size: 0.875rem;
    margin: 1.25rem 0;
  }
  .countdown.urgent { color: #f85149; font-weight: 600; }

  .actions {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    margin-top: 1.25rem;
  }
  .btn {
    flex: 1;
    padding: 0.625rem 1rem;
    border: none;
    border-radius: 6px;
    font-size: 0.9375rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .btn-deny {
    background: #da3633;
    color: #fff;
  }
  .btn-approve {
    background: #238636;
    color: #fff;
  }

  .pending-count {
    text-align: center;
    color: #8b949e;
    font-size: 0.8125rem;
    margin-top: 1rem;
  }
  #approvalList {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  #approvalList .approval-card { display: block; }
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-brand"><img src="/logo.png" alt="" class="nav-logo">AgentWall</span>
  <a href="/" class="nav-active">Approval</a>
  <a href="/policy">Policy</a>
  <a href="/log">Log</a>
  <a href="/clients">Clients</a>
  <span class="status-dot" id="statusDot" title="Connected"></span>
  <button id="muteBtn" onclick="toggleMute()" title="Toggle notification sound" style="background:none;border:none;font-size:1.125rem;cursor:pointer;padding:0.25rem;opacity:0.7;transition:opacity 0.15s;">&#x1f514;</button>
</nav>

<div class="container">
  <div id="emptyState" class="empty-state">
    <h2>No pending approvals</h2>
    <p>Approval requests from your agents will appear here.</p>
    <div class="clients-summary" id="clientsSummary"></div>
    <div class="empty-links">
      <a href="/clients">Manage Clients</a>
      <a href="/policy">Policy Editor</a>
      <a href="/log">View Logs</a>
    </div>
  </div>

  <div id="approvalList"></div>
</div>

<script>
(function () {
  const TIMEOUT_SECONDS = 30;
  let queue = [];
  let timers = {};
  let ws = null;

  function updateTabTitle() {
    if (queue.length > 0) {
      document.title = "(" + queue.length + ") AgentWall \u2014 Approval Required";
    } else {
      document.title = "AgentWall";
    }
  }

  var audioCtx = null;
  var soundMuted = localStorage.getItem("agentwall_mute") === "1";

  function updateMuteBtn() {
    document.getElementById("muteBtn").textContent = soundMuted ? "\u{1F515}" : "\u{1F514}";
    document.getElementById("muteBtn").title = soundMuted ? "Sound off — click to unmute" : "Sound on — click to mute";
  }

  window.toggleMute = function () {
    soundMuted = !soundMuted;
    localStorage.setItem("agentwall_mute", soundMuted ? "1" : "0");
    updateMuteBtn();
  };

  updateMuteBtn();

  function warmAudioContext() {
    try {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
    } catch (e) {}
  }

  document.addEventListener("click", warmAudioContext, { once: false });
  document.addEventListener("keydown", warmAudioContext, { once: false });

  function playNotificationSound() {
    try {
      if (soundMuted) return;
      warmAudioContext();
      if (!audioCtx || audioCtx.state !== "running") return;

      var oscillator = audioCtx.createOscillator();
      var gainNode = audioCtx.createGain();

      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      oscillator.type = "sine";
      oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
      oscillator.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.3);

      gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);

      oscillator.start(audioCtx.currentTime);
      oscillator.stop(audioCtx.currentTime + 0.5);
    } catch (e) {
      // Silently ignore — sound failure must never affect approval flow
    }
  }

  function connect() {
    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    ws = new WebSocket(proto + "//" + location.host + "/ws");

    ws.onopen = function () {
      document.getElementById("statusDot").classList.remove("disconnected");
      document.getElementById("statusDot").title = "Connected";
    };

    ws.onclose = function () {
      document.getElementById("statusDot").classList.add("disconnected");
      document.getElementById("statusDot").title = "Disconnected";
      setTimeout(connect, 2000);
    };

    ws.onmessage = function (event) {
      var msg = JSON.parse(event.data);

      if (msg.type === "approval_request") {
        queue.push(msg);
        renderAll();
        updateTabTitle();
        playNotificationSound();
      }

      if (msg.type === "approval_resolved") {
        removeApproval(msg.id);
        updateTabTitle();
      }
    };
  }

  function removeApproval(id) {
    queue = queue.filter(function (a) { return a.id !== id; });
    if (timers[id]) { clearInterval(timers[id]); delete timers[id]; }
    renderAll();
  }

  function renderAll() {
    var list = document.getElementById("approvalList");
    var empty = document.getElementById("emptyState");

    if (queue.length === 0) {
      list.innerHTML = "";
      empty.style.display = "";
      return;
    }

    empty.style.display = "none";

    // Clear old timers for cards that no longer exist
    var activeIds = {};
    for (var i = 0; i < queue.length; i++) activeIds[queue[i].id] = true;
    for (var tid in timers) {
      if (!activeIds[tid]) { clearInterval(timers[tid]); delete timers[tid]; }
    }

    var html = "";
    for (var i = 0; i < queue.length; i++) {
      var a = queue[i];
      html += '<div class="approval-card" id="card-' + a.id + '">'
        + '<div class="card-header">Approval Request</div>'
        + '<div class="field"><div class="field-label">Tool</div>'
        + '<div class="field-value">' + escapeHtml(a.toolName) + '</div></div>'
        + '<div class="field"><div class="field-label">Runtime</div>'
        + '<div class="field-value">' + escapeHtml(a.runtime) + '</div></div>'
        + '<div class="field"><div class="field-label">Time</div>'
        + '<div class="field-value">' + new Date(a.timestamp).toLocaleTimeString() + '</div></div>'
        + '<div class="field"><div class="field-label">Arguments</div>'
        + '<div class="args-block">' + escapeHtml(JSON.stringify(a.params, null, 2)) + '</div></div>'
        + '<div class="countdown" id="cd-' + a.id + '"></div>'
        + '<div class="actions">'
        + '<button class="btn btn-deny" id="deny-' + a.id + '" onclick="decide(\'' + a.id + '\',\'deny\')">Deny</button>'
        + '<button class="btn btn-approve" id="approve-' + a.id + '" onclick="decide(\'' + a.id + '\',\'allow\')">Approve</button>'
        + '</div></div>';
    }
    list.innerHTML = html;

    for (var i = 0; i < queue.length; i++) {
      if (!timers[queue[i].id]) startCountdown(queue[i]);
    }
  }

  function escapeHtml(s) {
    var d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  function startCountdown(approval) {
    var startTime = new Date(approval.timestamp).getTime();

    function tick() {
      var el = document.getElementById("cd-" + approval.id);
      if (!el) { clearInterval(timers[approval.id]); delete timers[approval.id]; return; }
      var elapsed = (Date.now() - startTime) / 1000;
      var remaining = Math.max(0, Math.ceil(TIMEOUT_SECONDS - elapsed));
      el.textContent = "Auto-denying in " + remaining + " second" + (remaining !== 1 ? "s" : "");
      el.className = remaining <= 10 ? "countdown urgent" : "countdown";
      if (remaining <= 0) { clearInterval(timers[approval.id]); delete timers[approval.id]; }
    }

    tick();
    timers[approval.id] = setInterval(tick, 1000);
  }

  window.decide = function (id, decision) {
    var btnD = document.getElementById("deny-" + id);
    var btnA = document.getElementById("approve-" + id);
    if (btnD) btnD.disabled = true;
    if (btnA) btnA.disabled = true;

    fetch("/api/approve/" + id, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ decision: decision }),
    }).then(function () {
      removeApproval(id);
    }).catch(function () {
      if (btnD) btnD.disabled = false;
      if (btnA) btnA.disabled = false;
    });
  };

  function loadClientsSummary() {
    fetch("/api/clients")
      .then(function (res) { return res.json(); })
      .then(function (data) {
        var names = [];
        for (var i = 0; i < data.clients.length; i++) {
          var c = data.clients[i];
          if (!c.installed) continue;
          var allProtected = c.kind === "plugin" ||
            (c.servers.length > 0 && c.servers.every(function (s) { return s.protected || s.ignored; }));
          if (allProtected) names.push(c.name);
        }
        var el = document.getElementById("clientsSummary");
        if (names.length > 0) {
          el.innerHTML = '<span class="protected-label">Protected:</span> ' + names.join(" &middot; ");
        }
      })
      .catch(function () {});
  }

  connect();
  loadClientsSummary();
  updateTabTitle();
})();
</script>
</body>
</html>
